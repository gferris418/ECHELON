name: Documentation integrity

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: documentation-integrity-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Verify governance and policy files
        run: |
          set -euo pipefail
          required_files=(
            README.md
            SECURITY.md
            CONTRIBUTING.md
            .gitignore
            .dockerignore
            .github/dependabot.yml
            eslint.config.mjs
            docs/README.md
            docs/api-reference.md
            docs/architecture-overview.md
            docs/developer-guide.md
            docs/governance-and-operations.md
            docs/github-repository-settings-checklist.md
            docs/mac-development-and-container-policy.md
            docs/container-runtime-hardening.md
            docs/data-governance-and-memory-boundaries.md
            docs/local-capacity-and-performance-budget.md
            docs/research/hermes-mission-control-reference-assessment.md
            docs/audits/2026-07-06-code-security-performance-dependency-review.md
            docs/audits/2026-07-06-repository-governance-container-audit.md
            docs/audits/2026-07-06-principal-architecture-audit.md
            docs/releases/v0.1.md
            docs/releases/v0.2.md
            docs/releases/v0.3.md
            docs/adr/README.md
            docs/adr/0001-modular-monolith-and-hybrid-language-model.md
            docs/adr/0002-canonical-state-tasks-and-event-delivery.md
            docs/adr/0003-identity-authorization-and-service-tokens.md
            docs/adr/0004-kernel-native-policy-module.md
            docs/adr/0005-append-only-audit-and-classifications.md
            docs/adr/0006-minio-and-openbao.md
            docs/adr/0007-contract-first-apis-and-sse.md
            docs/adr/0008-capability-trust-and-policy-based-authority.md
            docs/phase-execution-register-v0.3.md
            docs/pending-tasks.md
            docs/phase-tools-catalog-v0.3.md
            .echelon/platform.yaml
            .echelon/phases.yaml
            .echelon/capabilities.yaml
            .echelon/quality-gates.yaml
            .echelon/ai-rules.yaml
            .echelon/local-development.yaml
            .echelon/module-installation-record.template.yaml
            .env.example
            infrastructure/compose/local.yml
            packages/contracts/openapi/kernel.yaml
            packages/contracts/events/task/envelope.json
            packages/contracts/events/approval/envelope.json
            packages/contracts/events/audit/envelope.json
            packages/contracts/events/capability/envelope.json
            packages/contracts/schemas/common/id.json
            packages/contracts/schemas/errors/error-envelope.json
          )
          for required_file in "${required_files[@]}"; do
            test -f "$required_file"
          done
      - name: Verify baseline, capability registry, and runtime policy
        run: |
          set -euo pipefail
          grep -q 'v0.3' README.md
          grep -q 'GitHub is authoritative' README.md
          grep -q 'Current implementation status: no public API endpoints exist.' docs/api-reference.md
          grep -q 'ECHELON is in **Phase -1' docs/developer-guide.md
          grep -q 'registry_schema_version: 1' .echelon/capabilities.yaml
          grep -q 'candidate_is_not_authorized_for_installation: true' .echelon/capabilities.yaml
          grep -q 'quality_gate_schema_version: 1' .echelon/quality-gates.yaml
          grep -q 'host_root: /Users/babuislam/Developer/ECHELON' .echelon/local-development.yaml
          grep -q 'container_runtime: OrbStack Docker' .echelon/local-development.yaml
          grep -q 'privileged_containers: prohibited' .echelon/local-development.yaml
          grep -q 'module-installation-record.template.yaml' .echelon/local-development.yaml
          grep -q 'data_governance:' .echelon/platform.yaml
          grep -q 'openapi: 3.1.0' packages/contracts/openapi/kernel.yaml
          grep -q 'ECHELON Kernel API' packages/contracts/openapi/kernel.yaml
          grep -q 'TaskEventEnvelope' packages/contracts/events/task/envelope.json
      - name: Verify workflow actions are immutable SHA pinned
        run: |
          set -euo pipefail
          uses_lines="$(grep -R --include='*.yml' --include='*.yaml' -E '^[[:space:]]*-[[:space:]]*uses:' .github/workflows || true)"
          if [ -n "$uses_lines" ]; then
            invalid_uses="$(printf '%s\n' "$uses_lines" | grep -vE '@[0-9a-f]{40}([[:space:]]|$)' || true)"
            test -z "$invalid_uses" || {
              printf '%s\n' 'Every GitHub Action must be pinned to a full 40-character commit SHA.'
              printf '%s\n' "$invalid_uses"
              exit 1
            }
          fi
      - name: Verify local-only paths are ignored
        run: |
          set -euo pipefail
          git check-ignore -q .env
          git check-ignore -q secrets/example
          git check-ignore -q data/example
          git check-ignore -q backups/example
          git check-ignore -q infrastructure/compose.local.yml
          test "$(git check-ignore -q .env.example; echo $?)" -ne 0
