project:
  name: Project ECHELON
  current_baseline: v0.3
  current_phase: phase-minus-1
  status: architecture-and-documentation-control
source_of_truth:
  authoritative: github
  publication_layer: gitbook
  conflict_rule: github-wins
architecture:
  kernel_is_permanent: true
  capabilities_are_replaceable: true
  direct_capability_coupling: prohibited
  event_driven: true
  human_approval_for_critical_actions: required
local_development_policy:
  context_file: .echelon/local-development.yaml
  installation_record: .echelon/module-installation-record.template.yaml
  mac_policy: docs/mac-development-and-container-policy.md
  runtime_hardening: docs/container-runtime-hardening.md
core_services:
  - identity
  - capability-manager
  - task-engine
  - intelligence-bus
  - context-engine
  - secrets-interface
  - storage-interface
  - audit-timeline
  - health-observability-adapter
  - oracle-assistant