registry_schema_version: 1
policy:
  one_capability_one_best_tool: true
  capability_adoption_requires:
    - architecture_decision_record
    - module_installation_record
    - security_and_license_review
    - phase_gate_confirmation
    - health_check_and_rollback_plan
  candidate_is_not_authorized_for_installation: true
  research_is_not_authorized_for_integration: true

capabilities:
