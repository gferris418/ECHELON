    role: kernel_orchestration
    phase: phase-0
    status: core
    source: internal
  - id: mission_control
    role: operator_dashboard
    phase: phase-0
    status: core
    source: internal
  - id: oracle_assistant
    role: operator_assistant
    phase: phase-0
    status: core
    source: internal
  - id: task_engine
    role: task_lifecycle
    phase: phase-0
    status: core
    source: internal
  - id: intelligence_bus
    role: event_contract
    phase: phase-0
    status: core
    source: internal
  - id: context_engine
    role: bounded_context_and_provenance
    phase: phase-2
    status: core
    source: internal
  - id: capability_manifest
    role: capability_contract
    phase: phase-4
    status: core
    source: internal
  - id: echelon_foundry
    role: capability_lifecycle
    phase: phase-4
    status: core
    source: internal
  - id: workspace_manager
