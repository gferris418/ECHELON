<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Project ECHELON Architecture Overview</title>
  <desc id="desc">Layered architecture overview for Project ECHELON baseline v0.3.</desc>
  <defs>
    <style>
      .bg{fill:#0b1118}.panel{fill:#101b27;stroke:#26c6da;stroke-width:2}.core{fill:#10283b;stroke:#31b6ff;stroke-width:3}.infra{fill:#12342f;stroke:#32d7b1;stroke-width:2}.cap{fill:#1a311d;stroke:#6fd35f;stroke-width:2}.future{fill:#1e1b32;stroke:#ad7cff;stroke-width:2;stroke-dasharray:8 6}.gov{fill:#2a210f;stroke:#f0b94c;stroke-width:2}.box{fill:#122333;stroke:#4ea9d9;stroke-width:1.5}.label{font:700 22px Arial,sans-serif;fill:#f1f7fb}.small{font:500 15px Arial,sans-serif;fill:#d6e5ee}.mini{font:500 13px Arial,sans-serif;fill:#b8cdd8}.cyan{fill:#63d8f2}.green{fill:#84e77c}.amber{fill:#f8ca69}.purple{fill:#c19aff}.line{stroke:#65d8fa;stroke-width:3;fill:none;marker-end:url(#arrow)}.dash{stroke:#f3c45d;stroke-width:2;stroke-dasharray:7 6;fill:none}.purpleline{stroke:#b98cff;stroke-width:2;stroke-dasharray:8 6;fill:none;marker-end:url(#arrowP)}
    </style>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#65d8fa"/></marker>
    <marker id="arrowP" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#b98cff"/></marker>
