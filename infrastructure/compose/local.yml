name: echelon-local

services:
  postgres:
    image: postgres:16-alpine
    container_name: echelon-postgres
    restart: unless-stopped
    ports:
      - 127.0.0.1:5432:5432
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-echelon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-echelon}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-echelon} -d ${POSTGRES_DB:-echelon}']
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETUID
      - SETGID
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: echelon-redis
    restart: unless-stopped
    ports:
      - 127.0.0.1:6379:6379
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  minio:
    image: minio/minio:latest
    container_name: echelon-minio
    restart: unless-stopped
    ports:
      - 127.0.0.1:9000:9000
      - 127.0.0.1:9001:9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-echelon}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change_me}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://127.0.0.1:9000/minio/health/live']
      interval: 15s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  traefik:
    image: traefik:v3.1
    container_name: echelon-traefik
    restart: unless-stopped
    ports:
      - 127.0.0.1:8080:80
      - 127.0.0.1:8081:8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - '--providers.docker=true'
      - '--providers.docker.constraints=Label(`echelon.service`, `true`)'
      - '--entrypoints.web.address=:80'
      - '--api.dashboard=true'
      - '--api.debug=false'
      - '--log.level=INFO'
    labels:
      traefik.enable: 'true'
      traefik.http.routers.dashboard.rule: PathPrefix(`/api`) || PathPrefix(`/dashboard`)
      traefik.http.routers.dashboard.service: api@internal
    healthcheck:
      test: ['CMD', 'traefik', 'healthcheck', '--ping']
      interval: 15s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 128M

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
